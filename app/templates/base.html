<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}HeartLink{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
    rel="stylesheet"
  >

  <!-- Your custom CSS -->
  <link 
    rel="stylesheet" 
    href="{{ url_for('static', filename='css/styles.css') }}"
  >

  <!-- Favicon -->
  <link 
    rel="icon" 
    type="image/png" 
    href="{{ url_for('static', filename='logo.png') }}"
  >

  {% block extra_head %}{% endblock %}
</head>

<body>

  <!-- Shared Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">

      <a class="navbar-brand" href="{{ url_for('index') }}">
        HeartLink
      </a>

      <button 
        class="navbar-toggler" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navMenu"
        aria-controls="navMenu"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="bi bi-arrow-through-heart"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <!-- Show different navbar links based on the user's login status --> 
          {% if is_logged_in %}
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">
                Home
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'matches' %}active{% endif %}" href="{{ url_for('matches') }}">
                Matches
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'messages' %}active{% endif %}" href="{{ url_for('messages') }}">
                Messages
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'profile' %}active{% endif %}" href="{{ url_for('profile') }}">
                Profile
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('logout') }}">
                Log out
              </a>
            </li>

          {% else %}
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                Home
              </a>
            </li>

            <li class="nav-item d-flex align-items-center">
              <a class="btn-login ms-3" href="{{ url_for('login') }}">
                Login
              </a>
            </li>
          {% endif %}

        </ul>
      </div>

    </div>
  </nav>

  <!-- Page Content -->
  {% block content %}{% endblock %}

  <!-- Shared Footer -->
  <footer class="text-center py-4">
    <p>© 2026 HeartLink. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  {% block extra_scripts %}{% endblock %}

</body>
</html>
