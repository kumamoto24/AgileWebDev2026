<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}HeartLink{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
    rel="stylesheet"
  >

  <!-- Your custom CSS -->
  <link 
    rel="stylesheet" 
    href="{{ url_for('static', filename='styles.css') }}"
  >

  <!-- Favicon -->
  <link 
    rel="icon" 
    type="image/png" 
    href="{{ url_for('static', filename='logo.png') }}"
  >

  {% block extra_head %}{% endblock %}
</head>

<body>

  <!-- Shared Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">

      <a class="navbar-brand" href="{{ url_for('main.index') }}">
        HeartLink
      </a>

      <button 
        class="navbar-toggler" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navMenu"
        aria-controls="navMenu"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="bi bi-arrow-through-heart"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a 
              class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}" 
              href="{{ url_for('main.index') }}"
            >
              Home
            </a>
          </li>

          <li class="nav-item">
            <a 
              class="nav-link {% if request.endpoint == 'main.matches' %}active{% endif %}" 
              href="{{ url_for('main.matches') }}"
            >
              Matches
            </a>
          </li>

          <li class="nav-item">
            <a 
              class="nav-link {% if request.endpoint == 'main.messages' %}active{% endif %}" 
              href="{{ url_for('main.messages') }}"
            >
              Messages
            </a>
          </li>

          <li class="nav-item">
            <a 
              class="nav-link {% if request.endpoint == 'main.profile' %}active{% endif %}" 
              href="{{ url_for('main.profile') }}"
            >
              Profile
            </a>
          </li>

          <li class="nav-item d-flex align-items-center">
            <a class="btn-login ms-3" href="{{ url_for('main.login') }}">
              Login
            </a>
          </li>

        </ul>
      </div>

    </div>
  </nav>

  <!-- Page Content -->
  {% block content %}{% endblock %}

  <!-- Shared Footer -->
  <footer class="text-center py-4">
    <p>© 2026 HeartLink. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  {% block extra_scripts %}{% endblock %}

</body>
</html>
