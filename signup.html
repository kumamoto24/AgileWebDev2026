<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    .signup-container {
      width: 380px;
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .signup-container h1 {
      font-size: 48px;
      margin-bottom: 30px;
      color: #333;
    }

    .input-group {
      margin-bottom: 18px;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 18px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #1e90ff;
    }

    .signup-btn {
      width: 100%;
      padding: 15px;
      background: #1e90ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 28px;
      cursor: pointer;
      margin-top: 10px;
    }

    .signup-btn:hover {
      background: #187bdb;
    }

    .login-text {
      margin: 20px 0;
      font-size: 18px;
      color: #777;
    }

    .login-text a {
      color: #1e90ff;
      text-decoration: none;
      font-weight: bold;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    .divider span {
      margin: 0 10px;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid #333;
      background: white;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
    }

    .google-btn:hover {
      background: #f9f9f9;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <h1>Sign up</h1>

    <div class="input-group">
      <input type="text" placeholder="Name">
    </div>

    <div class="input-group">
      <input type="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" placeholder="Password">
    </div>

    <button class="signup-btn">Sign Up</button>

    <p class="login-text">
      Already have an account? <a href="#">Log In</a>
    </p>

    <div class="divider">
      <span>or</span>
    </div>

    <button class="google-btn">Sign up with Google</button>
  </div>

</body>
</html>
