<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HearLink - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #e63978, #ff8fab);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card */
.container {
  background: white;
  width: 380px;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  animation: fadeIn 0.8s ease;
}

/* Logo */
.logo {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  color: #e63978;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}

/* Inputs */
.input-group {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #e63978;
  box-shadow: 0 0 0 3px rgba(230,57,120,0.15);
}

/* Upload */
.file-input {
  border: 2px dashed #e63978;
  text-align: center;
  padding: 12px;
  cursor: pointer;
  border-radius: 12px;
  color: #e63978;
  font-size: 13px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #e63978;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #d62865;
  transform: scale(1.02);
}

/* Footer */
.footer {
  text-align: center;
  font-size: 13px;
  margin-top: 15px;
}

.footer a {
  color: #e63978;
  text-decoration: none;
  font-weight: 500;
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Floating hearts */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.6);
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

</style>
</head>
<body>

<!-- Floating hearts -->
<script>
for (let i = 0; i < 10; i++) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
}
</script>

<div class="container">
  <div class="logo">HearLink</div>
  <div class="subtitle">Find your campus match 💕</div>

  <form>

    <div class="input-group">
      <input type="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <input type="text" placeholder="Nickname" required>
    </div>

    <div class="input-group">
      <input type="password" placeholder="Password" required>
    </div>

    <div class="input-group">
      <select required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="input-group">
      <input type="date" required>
    </div>

    <!-- <div class="input-group">
      <label class="file-input">
        Upload Profile Picture
        <input type="file" hidden>
      </label>
    </div> -->

    <button type="submit">Create Account 💖</button>

  </form>

  <div class="footer">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

</body>
</html>
